<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (차트 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse (CSV 파싱 라이브러리) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9); display: flex;
            justify-content: center; align-items: center; z-index: 50; flex-direction: column;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8">

    <!-- 로딩 화면 -->
    <div id="loading" class="loading-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-lg font-semibold text-gray-600">실거래가 데이터를 불러오는 중입니다...</p>
    </div>

    <div class="max-w-7xl mx-auto space-y-6 hidden" id="dashboard">
        <!-- 헤더 -->
        <header class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">우리 동네 아파트 실거래가 대시보드</h1>
            <span class="bg-blue-100 text-blue-800 text-sm font-medium px-3 py-1 rounded-full" id="lastUpdated"></span>
        </header>

        <!-- 요약 카드 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-blue-500">
                <p class="text-sm text-gray-500 font-medium mb-1">전체 거래 건수</p>
                <h3 class="text-2xl font-bold text-gray-900" id="totalCount">0건</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-green-500">
                <p class="text-sm text-gray-500 font-medium mb-1">평균 거래가격</p>
                <h3 class="text-2xl font-bold text-gray-900" id="avgPrice">0만원</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-red-500">
                <p class="text-sm text-gray-500 font-medium mb-1">최고 거래가격</p>
                <h3 class="text-2xl font-bold text-gray-900" id="maxPrice">0만원</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-purple-500">
                <p class="text-sm text-gray-500 font-medium mb-1">최저 거래가격</p>
                <h3 class="text-2xl font-bold text-gray-900" id="minPrice">0만원</h3>
            </div>
        </div>

        <!-- 차트 영역 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-bold text-gray-800 mb-4">월별 평균 거래가격 추이</h2>
            <div class="relative h-72 w-full">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>

        <!-- 데이터 테이블 영역 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100">
                <h2 class="text-lg font-bold text-gray-800">최근 거래 목록</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b">
                        <tr>
                            <th scope="col" class="px-6 py-3">거래일자</th>
                            <th scope="col" class="px-6 py-3">법정동</th>
                            <th scope="col" class="px-6 py-3">아파트명</th>
                            <th scope="col" class="px-6 py-3 text-right">전용면적(㎡)</th>
                            <th scope="col" class="px-6 py-3 text-right">층</th>
                            <th scope="col" class="px-6 py-3 text-right">거래금액</th>
                            <th scope="col" class="px-6 py-3 text-center">건축년도</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 데이터가 이곳에 삽입됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CSV 데이터 URL (구글 시트 게시 링크)
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJK_iPG8ac7kmRdaHuCxqsefAdK0y4_Y_uPQ4sHlnh9qa5bucyeczIFDcNc4g4o1_BJQUdaceKsbIH/pub?gid=816771906&single=true&output=csv';

        // 금액 포맷팅 함수 (ex: 120,000만원 -> 12억 0000만원 또는 단순히 콤마 찍기)
        const formatPrice = (price) => {
            return new Intl.NumberFormat('ko-KR').format(Math.round(price)) + '만원';
        };

        const formatKoreanCurrency = (priceInManwon) => {
            if (priceInManwon >= 10000) {
                const uk = Math.floor(priceInManwon / 10000);
                const man = priceInManwon % 10000;
                return man > 0 ? `${uk}억 ${new Intl.NumberFormat('ko-KR').format(man)}만원` : `${uk}억원`;
            }
            return new Intl.NumberFormat('ko-KR').format(priceInManwon) + '만원';
        };

        // 데이터 로드 및 처리
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                processData(data);
                
                // 로딩 화면 숨기고 대시보드 표시
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                
                // 업데이트 날짜 표시
                const today = new Date();
                document.getElementById('lastUpdated').innerText = `업데이트: ${today.toLocaleDateString('ko-KR')}`;
            },
            error: function(err) {
                alert('데이터를 불러오는데 실패했습니다: ' + err.message);
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">데이터 로드 실패</p>';
            }
        });

        function processData(data) {
            let totalCount = 0;
            let sumPrice = 0;
            let maxPrice = -Infinity;
            let minPrice = Infinity;
            
            const monthlyStats = {};
            const tableRows = [];

            data.forEach(row => {
                // 키워드 매칭 안전하게 처리 (시트 헤더명에 따라 다를 수 있음)
                const dateRaw = row['거래일자'] || row['년월일'] || '';
                const priceRaw = row['거래금액(만원)'] || row['거래금액'] || '0';
                const aptName = row['아파트명'] || row['아파트'] || '-';
                const dong = row['법정동'] || '-';
                const area = row['전용면적(㎡)'] || row['전용면적'] || '-';
                const floor = row['층'] || '-';
                const buildYear = row['건축년도'] || '-';

                if (!dateRaw || !priceRaw) return; // 필수 데이터 없으면 스킵

                // 거래금액 정수형 변환 (콤마 제거)
                const price = parseInt(priceRaw.toString().replace(/,/g, ''), 10);
                if (isNaN(price)) return;

                // 통계 계산
                totalCount++;
                sumPrice += price;
                if (price > maxPrice) maxPrice = price;
                if (price < minPrice) minPrice = price;

                // 월별 데이터 그룹화 (YYYY-MM 추출)
                let monthKey = '';
                if (dateRaw.includes('-')) {
                    monthKey = dateRaw.substring(0, 7); // 2026-02-15 -> 2026-02
                } else if (dateRaw.length >= 6) {
                    monthKey = dateRaw.substring(0, 4) + '-' + dateRaw.substring(4, 6); // 20260215 -> 2026-02
                } else {
                    monthKey = '기타';
                }

                if (!monthlyStats[monthKey]) {
                    monthlyStats[monthKey] = { sum: 0, count: 0 };
                }
                monthlyStats[monthKey].sum += price;
                monthlyStats[monthKey].count++;

                // 테이블용 데이터 저장
                tableRows.push({
                    date: dateRaw, dong, aptName, area, floor, price, buildYear
                });
            });

            // 1. 요약 카드 렌더링
            const avgPrice = totalCount > 0 ? sumPrice / totalCount : 0;
            document.getElementById('totalCount').innerText = `${new Intl.NumberFormat('ko-KR').format(totalCount)}건`;
            document.getElementById('avgPrice').innerText = formatKoreanCurrency(avgPrice);
            document.getElementById('maxPrice').innerText = maxPrice !== -Infinity ? formatKoreanCurrency(maxPrice) : '0만원';
            document.getElementById('minPrice').innerText = minPrice !== Infinity ? formatKoreanCurrency(minPrice) : '0만원';

            // 2. 차트 렌더링
            renderChart(monthlyStats);

            // 3. 테이블 렌더링 (최신 날짜순 정렬 후 최대 100개만 표시)
            tableRows.sort((a, b) => b.date.localeCompare(a.date));
            renderTable(tableRows.slice(0, 100));
        }

        function renderChart(monthlyStats) {
            // 키(년-월) 기준으로 오름차순 정렬
            const sortedMonths = Object.keys(monthlyStats).sort();
            const labels = [];
            const dataPrices = [];

            sortedMonths.forEach(month => {
                labels.push(month);
                const avg = monthlyStats[month].sum / monthlyStats[month].count;
                dataPrices.push(Math.round(avg));
            });

            const ctx = document.getElementById('monthlyChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 평균 거래가격 (만원)',
                        data: dataPrices,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#2563eb',
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return formatKoreanCurrency(context.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return new Intl.NumberFormat('ko-KR').format(value);
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderTable(rows) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; // 초기화

            if(rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-4 text-center text-gray-500">데이터가 없습니다.</td></tr>';
                return;
            }

            rows.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'bg-white border-b hover:bg-gray-50';
                
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">${row.date}</td>
                    <td class="px-6 py-4">${row.dong}</td>
                    <td class="px-6 py-4 font-medium text-gray-900">${row.aptName}</td>
                    <td class="px-6 py-4 text-right">${row.area}</td>
                    <td class="px-6 py-4 text-right">${row.floor}</td>
                    <td class="px-6 py-4 text-right font-bold text-blue-600">${formatKoreanCurrency(row.price)}</td>
                    <td class="px-6 py-4 text-center">${row.buildYear}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
